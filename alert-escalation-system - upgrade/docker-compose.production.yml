version: "3.9"

services:
  api:
    build: .
    command: npm run start:api
    env_file:
      - .env.example
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis

  rule-worker:
    build: .
    command: npm run start:rule-worker
    env_file:
      - .env.example
    depends_on:
      - api
      - redis

  telemetry-worker:
    build: .
    command: npm run start:telemetry-worker
    env_file:
      - .env.example
    depends_on:
      - api
      - redis

  escalation-worker:
    build: .
    command: npm run start:escalation-worker
    env_file:
      - .env.example
    depends_on:
      - api
      - redis

  notification-worker:
    build: .
    command: npm run start:notification-worker
    env_file:
      - .env.example
    depends_on:
      - api
      - redis

  mqtt-worker:
    build: .
    command: npm run start:mqtt-worker
    env_file:
      - .env.example
    depends_on:
      - api
      - redis
    profiles:
      - mqtt

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: alert_escalation_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pg_data:
